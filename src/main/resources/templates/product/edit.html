<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Sửa sản phẩm</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card shadow p-4">
        <h2 class="mb-4">Chỉnh sửa sản phẩm</h2>
        <form th:action="@{/products/update/{id}(id=${product.id})}" th:object="${product}" method="post">

            <div class="mb-3">
                <label class="form-label">Tên sản phẩm:</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">URL Hình ảnh:</label>
                <input type="text" th:field="*{image}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Giá bán:</label>
                <input type="number" th:field="*{price}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Danh mục:</label>
                <select th:field="*{category}" class="form-select" required>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${cat.id == product.category.id}">
                    </option>
                </select>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Cập nhật</button>
                <a th:href="@{/products}" class="btn btn-secondary">Hủy bỏ</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
