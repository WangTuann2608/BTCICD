<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <style>
        .form-label {
            font-weight: 600;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .image-preview-container {
            margin-top: 15px;
            text-align: center;
        }
        .image-preview {
            max-width: 300px;
            max-height: 300px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
        }
        .form-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .form-title {
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-group-custom {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="form-card">
        <h2 class="form-title">
            <i class="bi bi-plus-square-fill" style="color: #667eea;"></i>
            Thêm sản phẩm mới
        </h2>
        <form th:action="@{/products/save}" th:object="${product}" method="post">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-tag-fill text-primary"></i>
                            Tên sản phẩm:
                        </label>
                        <input type="text" th:field="*{name}" class="form-control" required
                               placeholder="Nhập tên sản phẩm...">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-image-fill text-info"></i>
                            URL Hình ảnh:
                        </label>
                        <input type="text" th:field="*{image}" id="imageUrl" class="form-control"
                               placeholder="https://example.com/image.jpg"
                               onkeyup="previewImage()">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-currency-dollar text-success"></i>
                            Giá bán:
                        </label>
                        <input type="number" th:field="*{price}" class="form-control" required min="1"
                               placeholder="Nhập giá sản phẩm...">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-folder-fill text-warning"></i>
                            Danh mục:
                        </label>
                        <select th:field="*{category}" class="form-select" required>
                            <option value="">-- Chọn danh mục --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="image-preview-container">
                        <p class="text-muted"><i class="bi bi-eye"></i> Xem trước hình ảnh:</p>
                        <img id="imagePreview" class="image-preview" alt="Preview">
                        <p id="noImage" class="text-muted mt-3" style="font-style: italic;">
                            <i class="bi bi-image"></i><br>
                            Nhập URL hình ảnh để xem trước
                        </p>
                    </div>
                </div>
            </div>

            <div class="btn-group-custom">
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="bi bi-check-circle"></i> Lưu lại
                </button>
                <a th:href="@{/products}" class="btn btn-secondary btn-lg">
                    <i class="bi bi-x-circle"></i> Hủy bỏ
                </a>
            </div>
        </form>
    </div>

    <script>
        function previewImage() {
            const url = document.getElementById('imageUrl').value;
            const preview = document.getElementById('imagePreview');
            const noImage = document.getElementById('noImage');

            if (url && url.trim() !== '') {
                preview.src = url;
                preview.style.display = 'block';
                noImage.style.display = 'none';

                preview.onerror = function() {
                    preview.style.display = 'none';
                    noImage.innerHTML = '<i class="bi bi-exclamation-triangle text-danger"></i><br>Không thể tải hình ảnh';
                    noImage.style.display = 'block';
                };
            } else {
                preview.style.display = 'none';
                noImage.innerHTML = '<i class="bi bi-image"></i><br>Nhập URL hình ảnh để xem trước';
                noImage.style.display = 'block';
            }
        }
    </script>
</div>
</body>
</html>
