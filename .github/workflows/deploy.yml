name: CI/CD Push to Docker Hub

on:
  push:
    branches: [ "main" ] # Chạy khi bạn push code lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy code từ GitHub về máy ảo
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # Bước 4: Đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 5: Build Docker Image và Push lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          # Lưu ý: Thay 'user_docker' bằng tên thật hoặc dùng biến secret
          tags: ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest
